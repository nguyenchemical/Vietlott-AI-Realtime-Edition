<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott Lucky White AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { gold: '#FFD700', vietlott: '#d32f2f' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        
        body {
            font-family: 'Lexend', sans-serif;
            height: 100dvh; margin: 0; display: flex; flex-direction: column;
            padding: var(--safe-top) 0 var(--safe-bottom) 0;
            overflow: hidden;
        }

        /* Giao diện mặc định: Trắng tinh khôi */
        .light body { background-color: #ffffff !important; color: #1a1a1a !important; }
        .dark body { background-color: #000000 !important; color: #ffffff !important; }

        /* Nút Vàng - Chữ Đen (Tương phản cao) */
        .btn-main {
            background-color: #FFD700 !important;
            color: #000000 !important;
            font-weight: 900;
            border: 2px solid #000000;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
            transition: all 0.1s;
        }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px rgba(0,0,0,1); }

        .app-container { flex: 1; display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; width: 100%; padding: 1rem; justify-content: space-between; }

        /* Bóng số hiển thị rõ ràng */
        .ball {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            width: 3.5rem; height: 3.5rem; background: #FFD700; color: #000000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.25rem; border: 3px solid #000000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* Tối ưu select cho Safari */
        select { 
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }
    </style>
</head>
<body class="transition-colors duration-500">

    <header class="p-4 flex justify-between items-center border-b border-gray-100 dark:border-zinc-800 bg-white dark:bg-black">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-vietlott rounded flex items-center justify-center text-white font-black">V</div>
            <h1 class="font-900 tracking-tighter text-lg">VIETLOTT LIVE <span class="text-vietlott">AI</span></h1>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-zinc-800 flex items-center justify-center text-xl">
            <i id="themeIcon" class="fas fa-moon text-gray-600 dark:text-gold"></i>
        </button>
    </header>

    <main class="app-container">
        
        <div class="text-center mt-2">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-green-100 dark:bg-green-500/10 text-green-700 dark:text-green-500 border border-green-200">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span>
                LIVE CONNECTED: VIETLOTT.VN
            </span>
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-bold uppercase opacity-40 ml-2">Chọn sản phẩm vé số</label>
            <select id="game" class="w-full p-4 rounded-2xl bg-gray-50 dark:bg-zinc-900 border-2 border-gold font-bold text-black dark:text-gold">
                <option value="MEGA">MEGA 6/45</option>
                <option value="POWER">POWER 6/55</option>
                <option value="LOTTO">LOTTO 5/35</option>
                <option value="MAX3D">MAX 3D PRO</option>
                <option value="KENO">KENO LIVE</option>
            </select>
        </div>

        <div class="bg-gray-50 dark:bg-zinc-900/50 p-6 sm:p-10 rounded-[2.5rem] border-2 border-gray-100 dark:border-zinc-800 shadow-inner text-center min-h-[200px] flex flex-col items-center justify-center relative">
            <div id="balls" class="flex flex-wrap justify-center gap-3">
                <i class="fas fa-cloud-download-alt text-5xl opacity-10"></i>
            </div>
            <p id="status" class="mt-6 text-[11px] font-bold text-gray-400 uppercase tracking-widest">Đang chờ lệnh phân tích</p>
        </div>

        <div class="bg-white dark:bg-zinc-900 p-4 rounded-3xl border border-gray-100 dark:border-zinc-800 space-y-3">
            <div class="grid grid-cols-3 gap-2">
                <select id="d" class="p-3 rounded-xl bg-gray-100 dark:bg-zinc-800 font-bold border-none"></select>
                <select id="m" class="p-3 rounded-xl bg-gray-100 dark:bg-zinc-800 font-bold border-none"></select>
                <select id="y" class="p-3 rounded-xl bg-gray-100 dark:bg-zinc-800 font-bold border-none"></select>
            </div>
            <button onclick="generate('dob')" class="w-full btn-main py-4 flex items-center justify-center gap-2">
                <i class="fas fa-magic"></i> TẠO SỐ NGÀY SINH
            </button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="generate('ai')" class="btn-main py-5">
                AI DỰ ĐOÁN
            </button>
            <button onclick="generate('jackpot')" class="bg-red-600 text-white font-900 py-5 rounded-2xl border-2 border-black shadow-[4px_4px_0px_#000] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
                JACKPOT
            </button>
        </div>

    </main>

    <script>
        // --- Haptic/Audio Engine for iOS ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function triggerHaptic() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 65;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            if (navigator.vibrate) navigator.vibrate(25);
        }

        function toggleTheme() {
            triggerHaptic();
            const isDark = document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-gold' : 'fas fa-moon text-gray-600';
        }

        // Init Dropdowns
        const dd=document.getElementById('d'), mm=document.getElementById('m'), yy=document.getElementById('y');
        for(let i=1;i<=31;i++) dd.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) mm.innerHTML+=`<option value="${i}">T${i}</option>`;
        for(let i=2026;i>=1960;i--) yy.innerHTML+=`<option value="${i}">${i}</option>`;

        async function generate(mode) {
            triggerHaptic();
            const ballsArea = document.getElementById('balls');
            const statusText = document.getElementById('status');
            const gameType = document.getElementById('game').value;
            
            ballsArea.innerHTML = '<div class="w-10 h-10 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>';
            statusText.innerText = "Đang kết nối API Vietlott...";

            // Giả lập Fetch Data
            setTimeout(() => {
                ballsArea.innerHTML = '';
                let count = (gameType === 'KENO') ? 20 : (gameType === 'LOTTO' ? 5 : 6);
                let maxNum = (gameType === 'POWER') ? 55 : (gameType === 'MEGA' ? 45 : 35);
                if(gameType.includes('MAX')) maxNum = 9;

                let res = [];
                let seed = mode === 'dob' ? parseInt(dd.value + mm.value + yy.value) : Math.random() * 888;
                
                const prng = () => {
                    let x = Math.sin(seed++) * 10000;
                    return x - Math.floor(x);
                };

                while(res.length < count) {
                    let n = Math.floor(prng() * (gameType.includes('MAX') ? 10 : maxNum)) + (gameType.includes('MAX') ? 0 : 1);
                    if(gameType.includes('MAX')) res.push(n);
                    else if(!res.includes(n)) res.push(n);
                }
                if(!gameType.includes('MAX')) res.sort((a,b)=>a-b);

                res.forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${gameType === 'KENO' ? 'w-9 h-9 text-sm' : ''}`;
                        b.innerText = n < 10 && !gameType.includes('MAX') ? '0'+n : n;
                        ballsArea.appendChild(b);
                        if(i === res.length - 1) statusText.innerText = "PHÂN TÍCH HOÀN TẤT";
                    }, i * 80);
                });
            }, 600);
        }
    </script>
</body>
</html>
