<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI - Realtime Edition Pro</title>
    
    <link rel="icon" type="image/png" href="icln.png">
    <link rel="apple-touch-icon" href="icln.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Vietlott%20AI%22,%22short_name%22:%22VietlottAI%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22icons%22:[{%22src%22:%22icln.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Lexend', sans-serif; transition: all 0.5s ease; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #0a0a0a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s; }
        .splash-logo { width: 140px; height: 140px; object-fit: contain; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }

        /* Themes */
        .dark body { background: #0a0a0a; color: white; }
        .light body { background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%); color: #0369a1; }
        .bronze body { background: linear-gradient(135deg, #cd7f32, #f4a460, #8b4513); color: #fff; }

        .app-container { height: 100%; display: flex; flex-direction: column; padding: var(--safe-top) 1.2rem var(--safe-bottom) 1.2rem; max-width: 500px; margin: 0 auto; z-index: 10; position: relative; }
        
        /* Result Box */
        .result-box { flex: 1; margin: 0.5rem 0; border-radius: 2rem; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid; backdrop-filter: blur(8px); overflow: hidden; }
        .dark .result-box { background: rgba(255,255,255,0.05); border-color: #FFD700; }
        .light .result-box { background: rgba(255,255,255,0.6); border-color: #0ea5e9; }
        .bronze .result-box { background: rgba(255,255,255,0.2); border-color: #fff; }
        .bg-logo-inner { position: absolute; width: 80%; opacity: 0.15; pointer-events: none; z-index: 0; }

        /* Jackpot Meter */
        .meter-container { width: 100%; padding: 10px 20px; background: rgba(0,0,0,0.2); border-radius: 1rem; margin-bottom: 10px; }
        .meter-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: relative; }
        .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #22c55e, #eab308, #ef4444); transition: width 1.5s ease-out; }

        .ball { width: 3rem; height: 3rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; animation: pop 0.3s forwards; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 1; }
        .dark .ball, .light .ball { background: #FFD700; color: #000; }
        .bronze .ball { background: #fff; color: #8b4513; border-color: #fff; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .btn-main { width: 100%; padding: 1rem; border-radius: 1.2rem; font-weight: 900; text-transform: uppercase; border: none; transition: 0.2s; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .dark .btn-main { background: #FFD700; color: #000; }
        .light .btn-main { background: #0ea5e9; color: #fff; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        select { width: 100%; padding: 0.7rem; border-radius: 1rem; font-weight: 900; -webkit-appearance: none; outline: none; border: 2px solid; background: rgba(255,255,255,0.1); font-size: 14px; }
        #realtime-clock { font-family: monospace; font-weight: 700; font-size: 12px; color: #FFD700; }
    </style>
</head>
<body class="dark">
    <div id="splash">
        <img src="icln.png" class="splash-logo">
        <div class="mt-6 font-black text-gold tracking-widest text-sm">CONNECTING TO VIETLOTT AI...</div>
    </div>

    <div class="app-container">
        <header class="py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="icln.png" class="w-10 h-10 rounded-lg shadow-lg">
                <div>
                    <div id="realtime-clock">DD/MM/YYYY --:--:--</div>
                    <h1 class="font-900 text-lg uppercase">Vietlott AI Pro</h1>
                </div>
            </div>
            <button onclick="changeTheme()" class="w-10 h-10 bg-gold/20 rounded-xl flex items-center justify-center border-2 border-gold/50">
                <i id="themeIcon" class="fas fa-moon text-gold"></i>
            </button>
        </header>

        <select id="gameSelect" class="mb-2" onchange="syncTitle()">
            <option value="MEGA">MEGA 6/45</option>
            <option value="POWER">POWER 6/55</option>
            <option value="MAX3DPLUS">MAX 3D+</option>
            <option value="LOTTO">LOTTO 5/35 (REALTIME AI)</option>
            <option value="KENO">KENO (20 SỐ)</option>
            <option value="BINGO18">BINGO 18</option>
        </select>

        <div class="result-box" id="resultBox">
            <img src="icln.png" class="bg-logo-inner">
            <div id="gameName" class="font-900 text-xs tracking-widest mb-2 opacity-80 uppercase z-10">READY</div>
            <div id="ballArea" class="flex flex-wrap justify-center gap-2 p-2 z-10">
                <i class="fas fa-microchip fa-spin text-4xl opacity-20"></i>
            </div>
            <p id="statusMsg" class="mt-2 text-[10px] font-black uppercase italic opacity-60 z-10 text-center">Data Synchronized</p>
        </div>

        <div class="meter-container z-10">
            <div class="flex justify-between text-[10px] font-bold mb-1">
                <span>JACKPOT HEAT</span>
                <span id="meter-val">0%</span>
            </div>
            <div class="meter-bar">
                <div id="meter-fill" class="meter-fill"></div>
            </div>
            <div id="meter-status" class="text-[9px] mt-1 text-center opacity-70">AI Analyzing Market Depth...</div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-3">
            <select id="d"></select><select id="m"></select><select id="y"></select>
        </div>

        <div class="space-y-2 pb-4">
            <button onclick="runPredict('ai')" class="btn-main">AI Phân Tích Xác Suất</button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="runPredict('dob')" class="py-3 rounded-xl font-black text-[9px] uppercase bg-blue-600 text-white shadow-lg active:scale-95">Mệnh Cung AI</button>
                <button onclick="runPredict('jackpot')" class="py-3 rounded-xl font-black text-[9px] uppercase bg-red-600 text-white shadow-lg active:scale-95">Săn Jackpot</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Đồng hồ thời gian thực khớp máy chủ
        function updateClock() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const str = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            document.getElementById('realtime-clock').innerText = str;
        }
        setInterval(updateClock, 1000);

        // 2. Logic AI Nâng cao cho từng game
        function generateAdvancedNumbers(game, mode) {
            let nums = [];
            const rng = () => Math.random();
            
            if (game === 'MEGA' || game === 'POWER') {
                const limit = game === 'MEGA' ? 45 : 55;
                const targetSum = game === 'MEGA' ? 150 : 180;
                const range = game === 'MEGA' ? 30 : 40;
                
                // Thuật toán Vùng Vàng (Golden Zone) + Cân bằng Chẵn Lẻ
                let attempts = 0;
                while (attempts < 500) {
                    let tempNums = [];
                    while(tempNums.length < 6) {
                        let r = Math.floor(rng() * limit) + 1;
                        if(!tempNums.includes(r)) tempNums.push(r);
                    }
                    let sum = tempNums.reduce((a, b) => a + b, 0);
                    let evens = tempNums.filter(n => n % 2 === 0).length;
                    
                    if (sum >= targetSum - range && sum <= targetSum + range && evens >= 2 && evens <= 4) {
                        nums = tempNums.sort((a, b) => a - b);
                        break;
                    }
                    attempts++;
                }
            } else if (game === 'MAX3DPLUS') {
                // Logic Max 3D+: 2 bộ 3 con số (000-999)
                for(let i=0; i<2; i++) {
                    nums.push(Math.floor(rng() * 1000).toString().padStart(3, '0'));
                }
            } else if (game === 'LOTTO') {
                // Lotto 5/35 AI realtime - dựa trên milisecond của server
                let seed = Date.now();
                const lRng = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
                while(nums.length < 5) {
                    let r = Math.floor(lRng() * 35) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.sort((a, b) => a - b);
            } else if (game === 'KENO') {
                while(nums.length < 20) {
                    let r = Math.floor(rng() * 80) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.sort((a,b) => a-b);
            } else if (game === 'BINGO18') {
                for(let i=0; i<3; i++) nums.push(Math.floor(rng() * 6) + 1);
            }
            return nums;
        }

        // 3. Jackpot Meter Logic
        function updateJackpotMeter(game) {
            const meterFill = document.getElementById('meter-fill');
            const meterVal = document.getElementById('meter-val');
            const meterStatus = document.getElementById('meter-status');
            
            let heat = 0;
            if (game === 'MEGA' || game === 'POWER') heat = 70 + Math.random() * 25;
            else if (game === 'LOTTO') heat = 40 + Math.random() * 30;
            else heat = 10 + Math.random() * 20;

            meterFill.style.width = heat + '%';
            meterVal.innerText = Math.floor(heat) + '%';
            
            if (heat > 85) meterStatus.innerText = "CRITICAL: JACKPOT IS RIPE!";
            else if (heat > 60) meterStatus.innerText = "HIGH: Probability Increasing";
            else meterStatus.innerText = "STABLE: Standard Distribution";
        }

        // 4. Các hàm hệ thống khác
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.visibility = 'hidden', 800);
            }, 2000);
            syncTitle();
        });

        function changeTheme() {
            const body = document.documentElement;
            body.className = body.className === 'dark' ? 'light' : (body.className === 'light' ? 'bronze' : 'dark');
        }

        const selD = document.getElementById('d'), selM = document.getElementById('m'), selY = document.getElementById('y');
        for(let i=1;i<=31;i++) selD.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) selM.innerHTML += `<option value="${i}">Tháng ${i}</option>`;
        for(let i=2026;i>=1960;i--) selY.innerHTML += `<option value="${i}">${i}</option>`;

        function syncTitle() { 
            const s = document.getElementById('gameSelect'); 
            document.getElementById('gameName').innerText = s.options[s.selectedIndex].text;
            updateJackpotMeter(s.value);
        }

        function runPredict(mode) {
            const area = document.getElementById('ballArea'), status = document.getElementById('statusMsg'), game = document.getElementById('gameSelect').value;
            area.innerHTML = '<div class="w-10 h-10 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>';
            status.innerText = "AI đang tính toán vùng xác suất...";
            
            setTimeout(() => {
                area.innerHTML = '';
                const results = generateAdvancedNumbers(game, mode);
                updateJackpotMeter(game);

                results.forEach((n, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game==='KENO'?'w-7 h-7 text-[10px]':'w-11 h-11 text-base'}`;
                        b.innerText = n;
                        area.appendChild(b);
                        if(i === results.length - 1) status.innerText = "Phân tích hoàn tất - Tỉ lệ khớp cao!";
                    }, i * 100);
                });
            }, 1500);
        }
    </script>
</body>
</html>
