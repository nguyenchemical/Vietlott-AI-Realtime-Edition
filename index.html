<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI - High Contrast Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: var(--safe-top) 0 var(--safe-bottom) 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Giao diện tương phản cao: Vàng - Đen */
        .btn-contrast {
            background-color: #FFD700;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid #fff;
            transition: all 0.1s;
        }

        .btn-contrast:active {
            background-color: #e6c200;
            transform: scale(0.95);
        }

        .ball-pop {
            animation: ballPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ballPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        select {
            background: #1a1a1a;
            color: #FFD700;
            border: 2px solid #FFD700;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Hiệu ứng hào quang cho Jackpot */
        .jackpot-glow {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            border: 3px solid #FFD700 !important;
        }
    </style>
</head>
<body>

    <header class="p-6 text-center">
        <h1 class="text-3xl font-black text-[#FFD700] tracking-tighter">VIETLOTT AI <span class="text-white text-sm block opacity-50">ULTIMATE PRO</span></h1>
    </header>

    <main class="flex-grow flex flex-col justify-center px-6 space-y-6">
        
        <div class="space-y-2 text-center">
            <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Chọn sản phẩm</label>
            <select id="gameSelect" class="w-full text-lg" onchange="resetView()">
                <option value="MEGA">Mega 6/45</option>
                <option value="POWER">Power 6/55</option>
                <option value="LOTTO535">Lotto 5/35</option>
                <option value="MAX3D">Max 3D</option>
                <option value="MAX3DPRO">Max 3D Pro</option>
                <option value="KENO">Keno (20 số)</option>
                <option value="BINGO18">Bingo 18</option>
            </select>
        </div>

        <div id="resultDisplay" class="min-h-[200px] flex flex-col items-center justify-center bg-[#111] rounded-[2rem] p-6 border border-white/10">
            <div id="ballField" class="flex flex-wrap justify-center gap-3">
                <i class="fas fa-robot text-5xl opacity-10"></i>
            </div>
            <div id="aiStatus" class="mt-4 text-[10px] text-[#FFD700] font-bold uppercase tracking-widest">Sẵn sàng phân tích</div>
        </div>

        <div class="bg-[#1a1a1a] p-4 rounded-2xl border border-white/5 space-y-3">
            <div class="flex justify-between items-center px-1">
                <span class="text-[10px] font-bold opacity-50 uppercase">Ngày sinh của bạn</span>
                <i class="fas fa-calendar-star text-[#FFD700]"></i>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <select id="day"></select>
                <select id="month"></select>
                <select id="year"></select>
            </div>
            <button onclick="generate('dob')" class="w-full btn-contrast py-4 rounded-xl text-sm">
                <i class="fas fa-birthday-cake mr-2"></i>Tạo số ngày sinh
            </button>
        </div>
    </main>

    <footer class="p-6 grid grid-cols-2 gap-3">
        <button onclick="generate('ai')" class="btn-contrast py-5 rounded-2xl flex flex-col items-center">
            <span class="text-[10px] opacity-70">Gợi ý nhanh</span>
            <span class="text-lg">AI PHÂN TÍCH</span>
        </button>
        <button onclick="generate('jackpot')" class="btn-contrast py-5 rounded-2xl flex flex-col items-center jackpot-glow bg-red-600 text-white border-none">
            <span class="text-[10px] opacity-70">Siêu thuật toán</span>
            <span class="text-lg">DỰ ĐOÁN JACKPOT</span>
        </button>
    </footer>

    <audio id="sfxClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="sfxJackpot" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <script>
        const GAMES = {
            'MEGA': { max: 45, count: 6, color: 'bg-[#FFD700]' },
            'POWER': { max: 55, count: 6, color: 'bg-[#FFD700]' },
            'LOTTO535': { max: 35, count: 5, color: 'bg-[#FFD700]' },
            'MAX3D': { max: 9, count: 3, isRepeat: true, color: 'bg-[#FFD700]' },
            'MAX3DPRO': { max: 9, count: 6, isRepeat: true, color: 'bg-[#FFD700]' },
            'KENO': { max: 80, count: 20, color: 'bg-[#FFD700]' },
            'BINGO18': { max: 6, count: 3, isRepeat: true, color: 'bg-[#FFD700]' }
        };

        // Populate Dropdowns
        const d=document.getElementById('day'), m=document.getElementById('month'), y=document.getElementById('year');
        for(let i=1;i<=31;i++) d.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) m.innerHTML+=`<option value="${i}">T${i}</option>`;
        for(let i=2026;i>=1960;i--) y.innerHTML+=`<option value="${i}">${i}</option>`;

        function playSfx(id) {
            const a = document.getElementById(id);
            a.currentTime = 0;
            a.play().catch(()=>{});
        }

        // Kỹ thuật Rung giả lập cho iOS (Sử dụng âm thanh tần số thấp nếu vibrate bị chặn)
        function iosHaptic() {
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
            playSfx('sfxClick');
        }

        function resetView() {
            iosHaptic();
            document.getElementById('ballField').innerHTML = '<i class="fas fa-robot text-5xl opacity-10"></i>';
            document.getElementById('aiStatus').innerText = "Sẵn sàng phân tích";
        }

        function generate(mode) {
            iosHaptic();
            const gKey = document.getElementById('gameSelect').value;
            const config = GAMES[gKey];
            const field = document.getElementById('ballField');
            const status = document.getElementById('aiStatus');
            
            field.innerHTML = '';
            status.innerText = mode === 'jackpot' ? "Đang chạy siêu thuật toán Jackpot..." : "AI đang tính toán...";

            // Seed Logic
            let seed = Math.random() * 999999;
            if(mode === 'dob') seed = parseInt(d.value + m.value + y.value);
            if(mode === 'jackpot') seed = Date.now() * Math.random();

            const random = () => {
                let x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };

            let res = [];
            while(res.length < config.count) {
                let n = Math.floor(random() * (gKey.includes('MAX') ? 10 : config.max)) + (gKey.includes('MAX') ? 0 : 1);
                if(config.isRepeat) res.push(n);
                else if(!res.includes(n)) res.push(n);
            }
            if(!config.isRepeat) res.sort((a,b)=>a-b);

            res.forEach((n, i) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    const size = gKey === 'KENO' ? 'w-8 h-8 text-[10px]' : 'w-12 h-12 text-lg';
                    ball.className = `ball-pop ${size} bg-[#FFD700] text-black rounded-full flex items-center justify-center font-black shadow-[0_0_15px_rgba(255,215,0,0.3)] border-2 border-white`;
                    ball.innerText = n < 10 && !gKey.includes('MAX') ? `0${n}` : n;
                    field.appendChild(ball);
                    
                    if(i === res.length - 1) {
                        status.innerText = mode === 'jackpot' ? "ĐÃ TÌM THẤY BỘ SỐ JACKPOT TIỀM NĂNG!" : "HOÀN TẤT PHÂN TÍCH";
                        if(mode === 'jackpot') playSfx('sfxJackpot');
                    }
                }, i * 150);
            });
        }
    </script>
</body>
</html>
