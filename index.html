<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI Trực Tiếp - Bản Ổn Định</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Lexend', sans-serif; transition: all 0.4s ease; }
        
        /* Chế độ Tối */
        .dark body { background-color: #0d0d0d; color: #ffffff; }
        /* Chế độ Sáng */
        .light body { background-color: #f7fafc; color: #1a202c; }
        /* Chế độ ĐỒNG SÁNG (Mới - rực rỡ hơn) */
        .bronze body { background: linear-gradient(135deg, #a65e2e 0%, #e6a15c 100%); color: #fff; }

        #splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .splash-logo { width: 150px; height: 150px; border-radius: 35px; animation: pulse 1.2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

        .app-container { height: 100%; display: flex; flex-direction: column; padding: var(--safe-top) 1.2rem var(--safe-bottom) 1.2rem; max-width: 500px; margin: 0 auto; opacity: 0; transition: opacity 0.5s; }
        .app-visible { opacity: 1 !important; }

        .result-box { flex: 1; margin: 0.8rem 0; border-radius: 2.5rem; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; border: 2px solid; transition: all 0.3s; }
        .dark .result-box { background: rgba(255, 255, 255, 0.03); border-color: #FFD700; }
        .light .result-box { background: #ffffff; border-color: #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .bronze .result-box { background: rgba(255, 255, 255, 0.2); border-color: #ffffff; backdrop-filter: blur(10px); }

        #gameNameDisplay { font-weight: 900; font-size: 0.9rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; z-index: 10; color: #FFD700; }
        .bronze #gameNameDisplay { color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .ball { width: 3.2rem; height: 3.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid #000; z-index: 10; animation: ballIn 0.3s forwards; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .dark .ball, .light .ball { background: #FFD700; color: #000; }
        .bronze .ball { background: #ffffff; color: #a65e2e; border-color: #ffffff; }
        @keyframes ballIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .ctrl-btn { width: 3.2rem; height: 3.2rem; border-radius: 1.1rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .dark .ctrl-btn, .light .ctrl-btn { background: #FFD700; color: #000; }
        .bronze .ctrl-btn { background: rgba(255, 255, 255, 0.25); color: #fff; }

        .btn-main { width: 100%; padding: 1.2rem; border-radius: 1.4rem; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; border: none; transition: 0.2s; }
        .dark .btn-main, .light .btn-main { background: #FFD700; color: #000; box-shadow: 0 5px 0 #b39700; }
        .bronze .btn-main { background: #ffffff; color: #a65e2e; box-shadow: 0 5px 0 #824924; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 transparent; }

        select { width: 100%; padding: 0.9rem; border-radius: 1rem; font-weight: 900; -webkit-appearance: none; outline: none; border: 2px solid; }
        .dark select { background: #1a1a1a; border-color: #333; color: #fff; }
        .light select { background: #fff; border-color: #cbd5e1; color: #000; }
        .bronze select { background: rgba(255, 255, 255, 0.2); border-color: #fff; color: #fff; }
    </style>
</head>
<body class="dark">

    <div id="splash">
        <img src="icon.png" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2313/2313982.png'">
        <h1 class="text-gold mt-6 font-black italic uppercase tracking-wider" style="color:#FFD700">Vietlott AI</h1>
    </div>

    <div id="app" class="app-container">
        <header class="py-4 flex justify-between items-center">
            <div>
                <div class="bg-red-600 px-2 py-0.5 rounded text-white font-black italic text-[9px] animate-pulse w-fit">AI LIVE TRỰC TIẾP</div>
                <h1 class="font-900 text-2xl tracking-tighter uppercase">Vietlott AI</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="uiReset()" class="ctrl-btn"><i class="fas fa-redo-alt"></i></button>
                <button onclick="nextTheme()" class="ctrl-btn"><i id="tIcon" class="fas fa-moon"></i></button>
            </div>
        </header>

        <select id="gameSelect" class="mb-2" onchange="syncTitle()">
            <option value="MEGA">MEGA 6/45</option>
            <option value="POWER">POWER 6/55</option>
            <option value="LOTTO">LOTTO 5/35</option>
            <option value="MAX3D">MAX 3D</option>
            <option value="MAX3DPRO">MAX 3D PRO</option>
            <option value="KENO">KENO (20 SỐ)</option>
            <option value="BINGO18">BINGO 18</option>
        </select>

        <div class="result-box text-center">
            <div id="gameNameDisplay">SẴN SÀNG</div>
            <div id="ballArea" class="flex flex-wrap justify-center gap-2 p-4 relative z-10">
                <i class="fas fa-satellite-dish text-gold opacity-30 text-5xl animate-pulse"></i>
            </div>
            <p id="statusMsg" class="mt-2 font-black text-[10px] uppercase opacity-60 italic">Đã kết nối máy chủ AI</p>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4">
            <select id="dSelect"></select>
            <select id="mSelect"></select>
            <select id="ySelect"></select>
        </div>

        <div class="space-y-3 pb-6">
            <button onclick="startPredict('ai')" class="btn-main">Phân Tích AI</button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="startPredict('dob')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-blue-600 text-white active:opacity-80">Theo Ngày Sinh</button>
                <button onclick="startPredict('jackpot')" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-red-600 text-white active:opacity-80">Jackpot AI</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'vietlott_final_stable_v1';

        // Khởi tạo ngày tháng
        const d = document.getElementById('dSelect'), m = document.getElementById('mSelect'), y = document.getElementById('ySelect');
        for(let i=1;i<=31;i++) d.innerHTML+=`<option value="${i}">${i}</option>`;
        for(let i=1;i<=12;i++) m.innerHTML+=`<option value="${i}">Tháng ${i}</option>`;
        for(let i=2026;i>=1960;i--) y.innerHTML+=`<option value="${i}">${i}</option>`;

        function nextTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('tIcon');
            if(body.classList.contains('dark')) {
                body.className = 'light'; icon.className = 'fas fa-sun';
            } else if(body.classList.contains('light')) {
                body.className = 'bronze'; icon.className = 'fas fa-shield-alt';
            } else {
                body.className = 'dark'; icon.className = 'fas fa-moon';
            }
            saveAppState();
        }

        function syncTitle() {
            const sel = document.getElementById('gameSelect');
            document.getElementById('gameNameDisplay').innerText = sel.options[sel.selectedIndex].text;
            saveAppState();
        }

        function saveAppState() {
            const state = {
                game: document.getElementById('gameSelect').value,
                gameText: document.getElementById('gameNameDisplay').innerText,
                balls: document.getElementById('ballArea').innerHTML,
                status: document.getElementById('statusMsg').innerText,
                theme: document.documentElement.className,
                d: d.value, m: m.value, y: y.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function uiReset() {
            document.getElementById('ballArea').innerHTML = '<i class="fas fa-satellite-dish text-gold opacity-30 text-5xl animate-pulse"></i>';
            document.getElementById('statusMsg').innerText = "Hệ thống sẵn sàng";
            syncTitle();
        }

        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) {
                const s = JSON.parse(saved);
                document.getElementById('gameSelect').value = s.game;
                document.getElementById('gameNameDisplay').innerText = s.gameText;
                document.getElementById('ballArea').innerHTML = s.balls;
                document.getElementById('statusMsg').innerText = s.status;
                document.documentElement.className = s.theme;
                d.value = s.d; m.value = s.m; y.value = s.y;
                const icon = document.getElementById('tIcon');
                if(s.theme === 'dark') icon.className = 'fas fa-moon';
                else if(s.theme === 'light') icon.className = 'fas fa-sun';
                else icon.className = 'fas fa-shield-alt';
            } else {
                syncTitle();
            }

            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                document.getElementById('app').classList.add('app-visible');
                setTimeout(() => document.getElementById('splash').style.display='none', 500);
            }, 800);
        };

        function startPredict(mode) {
            const area = document.getElementById('ballArea');
            const status = document.getElementById('statusMsg');
            const game = document.getElementById('gameSelect').value;
            
            // Hiện loading
            area.innerHTML = '<div class="w-12 h-12 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>';
            status.innerText = "AI đang xử lý...";

            setTimeout(() => {
                area.innerHTML = '';
                const config = {
                    'MEGA':[45,6], 'POWER':[55,6], 'LOTTO':[35,5], 'MAX3D':[9,3],
                    'MAX3DPRO':[9,6], 'KENO':[80,20], 'BINGO18':[6,3]
                }[game];

                let results = [];
                // Công thức seed an toàn chống treo
                let seedVal = mode === 'dob' ? (Number(d.value) + Number(m.value) * 31 + Number(y.value)) : Date.now();
                
                const random = () => {
                    seedVal = (seedVal * 16807) % 2147483647;
                    return seedVal / 2147483647;
                };

                while(results.length < config[1]) {
                    let n = Math.floor(random() * (config[0] + (game.includes('MAX') ? 1 : 0))) + (game.includes('MAX') ? 0 : 1);
                    if(game.includes('MAX') || game === 'BINGO18') {
                        results.push(n);
                    } else if(!results.includes(n)) {
                        results.push(n);
                    }
                }
                if(!game.includes('MAX') && game !== 'BINGO18') results.sort((a,b) => a-b);

                results.forEach((num, i) => {
                    setTimeout(() => {
                        const b = document.createElement('div');
                        b.className = `ball ${game==='KENO'?'w-8 h-8 text-[10px]':'w-12 h-12 text-lg'}`;
                        b.innerText = num < 10 ? '0'+num : num;
                        area.appendChild(b);
                        if(i === results.length - 1) {
                            status.innerText = "Gợi ý hoàn tất!";
                            saveAppState();
                        }
                    }, i * 80);
                });
            }, 1000);
        }
    </script>
</body>
</html>
