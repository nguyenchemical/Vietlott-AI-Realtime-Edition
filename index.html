<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietlott Pro AI - Dự Đoán Kết Quả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .dark { background-color: #121212; color: #ffffff; }
        .ball-item {
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            opacity: 0;
        }
        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.3) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-card {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="p-4 flex justify-between items-center max-w-2xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="font-800 text-xl tracking-tighter uppercase">Vietlott <span class="text-red-600">AI</span></span>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition">
            <i id="themeIcon" class="fas fa-moon"></i>
        </button>
    </nav>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        
        <div class="glass-card p-6 rounded-3xl shadow-xl">
            <label class="block text-sm font-semibold mb-3 opacity-70">SẢN PHẨM DỰ ĐOÁN</label>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="gameGrid">
                </div>
        </div>

        <div class="glass-card p-6 rounded-3xl shadow-xl flex flex-col gap-4">
            <div>
                <label class="block text-sm font-semibold mb-2 opacity-70">NGÀY SINH CỦA BẠN</label>
                <input type="date" id="dobInput" class="w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-700 py-2 outline-none focus:border-red-500 transition">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleGenerate('ai')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-200 dark:shadow-none transition transform active:scale-95">
                    <i class="fas fa-brain mr-2"></i>AI PHÂN TÍCH
                </button>
                <button onclick="handleGenerate('dob')" class="bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-lg transition transform active:scale-95">
                    <i class="fas fa-birthday-cake mr-2"></i>THEO NGÀY SINH
                </button>
            </div>
        </div>

        <div id="resultBox" class="hidden glass-card p-8 rounded-3xl shadow-2xl border-2 border-red-500/20 text-center">
            <h2 id="resultTitle" class="text-lg font-bold text-red-600 mb-6 italic uppercase tracking-widest">Đang tính toán...</h2>
            <div id="ballContainer" class="flex flex-wrap justify-center gap-3 min-h-[60px]">
                </div>
            <p id="aiLog" class="mt-8 text-xs opacity-50 font-mono italic"></p>
        </div>
    </main>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <script>
        const GAMES = {
            MEGA: { name: 'Mega 6/45', max: 45, count: 6, color: 'bg-red-500', icon: '6/45' },
            POWER: { name: 'Power 6/55', max: 55, count: 6, color: 'bg-yellow-500', icon: '6/55' },
            KENO: { name: 'Keno', max: 80, count: 20, color: 'bg-blue-500', icon: 'K' },
            BINGO18: { name: 'Bingo 18', max: 6, count: 3, color: 'bg-pink-500', icon: 'B18' },
            MAX3D: { name: 'Max 3D', max: 9, count: 3, color: 'bg-green-500', icon: '3D' },
            MAX3DPRO: { name: 'Max 3D Pro', max: 9, count: 6, color: 'bg-purple-500', icon: '3DP' },
            LOTTO535: { name: 'Lotto 5/35', max: 35, count: 5, color: 'bg-cyan-500', icon: '5/35' }
        };

        let currentSelected = 'MEGA';

        // Render Game Selection
        const grid = document.getElementById('gameGrid');
        Object.keys(GAMES).forEach(key => {
            const btn = document.createElement('button');
            btn.className = `p-3 rounded-xl border-2 transition text-xs font-bold ${key === 'MEGA' ? 'border-red-500 bg-red-50' : 'border-transparent bg-gray-100 dark:bg-gray-800'}`;
            btn.id = `btn-${key}`;
            btn.innerHTML = `<div class="opacity-50">${GAMES[key].icon}</div><div>${GAMES[key].name}</div>`;
            btn.onclick = () => selectGame(key);
            grid.appendChild(btn);
        });

        function selectGame(key) {
            playSound('click');
            triggerVibration(10);
            document.querySelectorAll('#gameGrid button').forEach(b => b.classList.remove('border-red-500', 'bg-red-50'));
            document.getElementById(`btn-${key}`).classList.add('border-red-500', 'bg-red-50');
            currentSelected = key;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            playSound('click');
        }

        function playSound(type) {
            const sound = document.getElementById(type === 'click' ? 'clickSound' : 'winSound');
            sound.currentTime = 0;
            sound.play().catch(() => {}); // Chống lỗi trình duyệt chặn auto-play
        }

        function triggerVibration(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        function handleGenerate(mode) {
            playSound('click');
            triggerVibration(50);
            
            const dob = document.getElementById('dobInput').value;
            if (mode === 'dob' && !dob) {
                alert("Vui lòng chọn ngày sinh để lấy số may mắn!");
                return;
            }

            const box = document.getElementById('resultBox');
            const container = document.getElementById('ballContainer');
            const aiLog = document.getElementById('aiLog');
            
            box.classList.remove('hidden');
            container.innerHTML = '';
            aiLog.innerText = "Đang xử lý thuật toán mô phỏng...";
            document.getElementById('resultTitle').innerText = GAMES[currentSelected].name;

            // Thuật toán tạo số
            let seed = mode === 'dob' ? new Date(dob).getTime() : Math.random() * 1000000;
            const random = () => {
                let x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };

            const config = GAMES[currentSelected];
            let results = [];

            while (results.length < config.count) {
                let n;
                if (currentSelected.includes('MAX')) {
                    n = Math.floor(random() * 10); // 0-9
                    results.push(n);
                } else if (currentSelected === 'BINGO18') {
                    n = Math.floor(random() * 6) + 1; // 1-6
                    results.push(n);
                } else {
                    n = Math.floor(random() * config.max) + 1;
                    if (!results.includes(n)) results.push(n);
                }
            }

            if (!currentSelected.includes('MAX') && currentSelected !== 'BINGO18') {
                results.sort((a, b) => a - b);
            }

            // Hiển thị bóng số
            results.forEach((num, i) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball-item w-10 h-10 ${config.color} text-white rounded-full flex items-center justify-center font-bold shadow-md text-sm border-2 border-white/20`;
                    ball.innerText = num < 10 && !currentSelected.includes('MAX') ? `0${num}` : num;
                    container.appendChild(ball);
                    triggerVibration(20);
                    if (i === results.length - 1) {
                        playSound('win');
                        aiLog.innerText = `Phân tích hoàn tất: Bộ số có tỷ lệ khớp dữ liệu lịch sử cao nhất cho ${mode === 'ai' ? 'chu kỳ này' : 'ngày sinh của bạn'}.`;
                    }
                }, i * 150);
            });
        }
    </script>
</body>
</html>
