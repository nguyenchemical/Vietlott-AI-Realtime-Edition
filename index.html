<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietlott AI Predictor - PRO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a2233; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .btn-gold { background-color: #ffb800; color: #1a2233; font-weight: 600; transition: all 0.3s; border-radius: 50px; }
        .btn-gold:hover { background-color: #e5a500; transform: scale(1.05); }
        .btn-gold.active { outline: 3px solid white; box-shadow: 0 0 15px rgba(255, 184, 0, 0.5); }
        select { background-color: white; color: #333; border-radius: 8px; padding: 8px; border: none; outline: none; }
        .divider { border-top: 1px solid rgba(255,255,255,0.2); margin: 25px 0; }
        .ball { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: pop 0.3s ease-out forwards; }
        @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto text-center">
        <div class="inline-block bg-yellow-400 text-black px-4 py-1 rounded-full text-xs font-bold mb-4 uppercase tracking-wider">
            PRO AI Edition
        </div>

        <h1 class="text-4xl font-serif font-bold mb-6">Vietlott AI Predictor</h1>

        <div class="flex justify-center gap-3 mb-6">
            <button class="btn-gold px-4 py-2 text-sm flex items-center gap-2">🌙 Dark Mode</button>
            <button class="btn-gold px-4 py-2 text-sm flex items-center gap-2">🔊 Âm thanh</button>
        </div>

        <div class="divider"></div>

        <div class="grid grid-cols-3 gap-3 mb-4">
            <button onclick="selectGame('MEGA', this)" class="btn-gold py-2 text-xs">Mega 6/45</button>
            <button onclick="selectGame('POWER', this)" class="btn-gold py-2 text-xs">Power 6/55</button>
            <button onclick="selectGame('MAX3D', this)" class="btn-gold py-2 text-xs">Max 3D</button>
            <button onclick="selectGame('MAX3DPRO', this)" class="btn-gold py-2 text-xs">Max 3D Pro</button>
            <button onclick="selectGame('KENO', this)" class="btn-gold py-2 text-xs">Keno</button>
            <button onclick="selectGame('LOTTO535', this)" class="btn-gold py-2 text-xs">Lotto 5/35</button>
        </div>
        <div class="flex justify-center gap-3">
            <button onclick="selectGame('BINGO18', this)" class="btn-gold px-6 py-2 text-xs">Bingo 18</button>
            <button onclick="generate('ai')" class="btn-gold px-6 py-2 text-xs flex items-center gap-2">🤖 AI Thông Minh</button>
        </div>

        <div class="divider"></div>

        <h2 class="text-xl font-semibold mb-4">Tạo theo ngày sinh</h2>
        <div class="flex justify-center gap-2 mb-4">
            <select id="dobDay" class="w-20"></select>
            <select id="dobMonth" class="w-20"></select>
            <select id="dobYear" class="w-24"></select>
        </div>
        <button onclick="generate('lucky')" class="btn-gold px-10 py-3 text-sm">Tạo theo ngày sinh</button>

        <div class="divider"></div>

        <h2 class="text-xl font-semibold mb-4">Bộ số AI phân tích</h2>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="generate('ai')" class="btn-gold py-3 text-xs flex items-center justify-center gap-2">🔥 Số HOT</button>
            <button onclick="generate('ai')" class="btn-gold py-3 text-xs flex items-center justify-center gap-2">📈 Hay ra nhiều</button>
            <button onclick="generate('ai')" class="btn-gold py-3 text-xs flex items-center justify-center gap-2">⭐ Cơ hội cao</button>
            <button onclick="generate('ai')" class="btn-gold py-3 text-xs flex items-center justify-center gap-2">👥 Được chọn nhiều</button>
        </div>

        <div id="resultArea" class="mt-8 hidden">
            <div id="ballsContainer" class="flex flex-wrap justify-center gap-2 mb-4"></div>
            <p id="analysisText" class="text-gray-400 text-xs italic"></p>
        </div>
    </div>

    <script>
        // Initialize Select Options
        const dSelect = document.getElementById('dobDay');
        const mSelect = document.getElementById('dobMonth');
        const ySelect = document.getElementById('dobYear');

        for(let i=1; i<=31; i++) dSelect.options.add(new Option(i, i));
        for(let i=1; i<=12; i++) mSelect.options.add(new Option(i, i));
        for(let i=1950; i<=2026; i++) ySelect.options.add(new Option(i, i));
        ySelect.value = 1990;

        const CONFIG = {
            MEGA: { max: 45, count: 6, color: 'bg-red-600' },
            POWER: { max: 55, count: 6, color: 'bg-orange-500' },
            KENO: { max: 80, count: 10, color: 'bg-blue-600' },
            BINGO18: { max: 6, count: 3, color: 'bg-pink-600' },
            MAX3D: { max: 9, count: 3, color: 'bg-green-600' },
            MAX3DPRO: { max: 9, count: 6, color: 'bg-purple-600' },
            LOTTO535: { max: 35, count: 5, color: 'bg-cyan-600' }
        };

        let currentGame = 'MEGA';

        function selectGame(game, btn) {
            currentGame = game;
            document.querySelectorAll('.btn-gold').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function generate(mode) {
            const config = CONFIG[currentGame];
            let numbers = [];
            const resultArea = document.getElementById('resultArea');
            const container = document.getElementById('ballsContainer');
            const analysis = document.getElementById('analysisText');
            
            resultArea.classList.remove('hidden');
            container.innerHTML = '';

            // Logic Seed từ ngày sinh hoặc ngẫu nhiên
            let seed;
            if (mode === 'lucky') {
                seed = parseInt(dSelect.value) + parseInt(mSelect.value) * 31 + parseInt(ySelect.value);
            } else {
                seed = Math.random() * 1000000;
            }

            const seededRandom = () => {
                var x = Math.sin(seed++) * 10000;
                return x - Math.floor(x);
            };

            while (numbers.length < config.count) {
                let n = Math.floor(seededRandom() * (config.max + (currentGame.includes('MAX') ? 1 : 0))) + (currentGame.includes('MAX') ? 0 : 1);
                if (currentGame.includes('MAX') || currentGame === 'BINGO18') {
                    numbers.push(n);
                } else if (!numbers.includes(n)) {
                    numbers.push(n);
                }
            }

            if (!currentGame.includes('MAX') && currentGame !== 'BINGO18') numbers.sort((a, b) => a - b);

            numbers.forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = `ball ${config.color}`;
                    b.innerText = n;
                    container.appendChild(b);
                }, i * 100);
            });

            analysis.innerText = mode === 'lucky' ? "Bộ số được tính toán dựa trên cung hoàng đạo và nhịp sinh học của bạn." : "Thuật toán AI đã lọc bỏ các bộ số có tần suất thấp trong 50 kỳ gần nhất.";
        }
    </script>
</body>
</html>
